services:
  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - "3000:3000"

  gotenberg-ui:
    # To use the pre-built image (standalone compose), replace 'build: .' with:
    # image: ghcr.io/aadisprabs/gotenberg-ui:latest
    build: .
    ports:
      - "8080:8080"
    environment:
      - GOTENBERG_URL=http://gotenberg:3000
    depends_on:
      - gotenberg
